<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MAP Automation{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1, h2 { margin: 0 0 12px; font-weight: 600; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.1rem; color: var(--muted); }
    label { display: block; margin: 12px 0 4px; font-size: 0.9rem; color: var(--muted); }
    input[type=text], input[type=password], input[type=number], input[type=file] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    button, .btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-muted { background: var(--border); color: var(--text); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-idle { background: #334155; color: #cbd5e1; }
    .badge-running { background: #14532d; color: #86efac; }
    .badge-stopping { background: #713f12; color: #fde68a; }
    .badge-failed { background: #7f1d1d; color: #fca5a5; }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .alert-ok { background: #14532d; color: #86efac; }
    .alert-err { background: #7f1d1d; color: #fca5a5; }
    pre.logs {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.45;
      overflow-x: auto;
      white-space: pre-wrap;
      max-height: 320px;
      overflow-y: auto;
      margin: 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .progress-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
